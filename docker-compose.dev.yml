services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: forge-postgres
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge_dev_2026
      POSTGRES_DB: forge_main
    ports:
      - "5432:5432"
    volumes:
      - forge-pg-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: forge-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass forge_redis_2026

  temporal:
    image: temporalio/auto-setup:1.24
    container_name: forge-temporal
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=forge
      - POSTGRES_PWD=forge_dev_2026
      - POSTGRES_SEEDS=postgres
      - SKIP_SCHEMA_SETUP=false
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: forge-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8233:8080"
    depends_on:
      - temporal

  ai-worker:
    build: ./ai-worker
    container_name: forge-ai-worker
    env_file: ./ai-worker/.env
    environment:
      - TEMPORAL_HOST=temporal:7233
      - FORGE_API_URL=http://host.docker.internal:8080
      - REDIS_HOST=redis
    depends_on:
      - temporal
    restart: unless-stopped

  # --- Observability Stack ---

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: forge-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - forge-prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    container_name: forge-loki
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - forge-loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    container_name: forge-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=forge_grafana_2026
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/platform-health.json
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - forge-grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  forge-pg-data:
  forge-prometheus-data:
  forge-loki-data:
  forge-grafana-data:
