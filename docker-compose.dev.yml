services:
  postgres:
    image: postgres:16-alpine
    container_name: forge-postgres
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge_dev_2026
      POSTGRES_DB: forge_main
    ports:
      - "5432:5432"
    volumes:
      - forge-pg-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: forge-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass forge_redis_2026

  temporal:
    image: temporalio/auto-setup:1.24
    container_name: forge-temporal
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=forge
      - POSTGRES_PWD=forge_dev_2026
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: forge-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8233:8080"
    depends_on:
      - temporal

  forge-core:
    build:
      context: ./forge-core
      dockerfile: Dockerfile.dev
    container_name: forge-core
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://forge:forge_dev_2026@postgres:5432/forge_main?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: forge_redis_2026
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      temporal:
        condition: service_started

  forge-portal:
    build:
      context: ./forge-portal
      dockerfile: Dockerfile.dev
    container_name: forge-portal
    ports:
      - "3000:3000"
    environment:
      API_URL: http://forge-core:8080
    depends_on:
      - forge-core

volumes:
  forge-pg-data:
