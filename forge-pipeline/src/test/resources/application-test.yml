spring:
  datasource:
    url: jdbc:h2:mem:forge_pipeline_test;MODE=MYSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/test-migration
  data:
    redis:
      host: localhost
      port: 6379

forge:
  adapter:
    codeup:
      base-url: http://localhost:8899
      org-id: test-org
    flow:
      base-url: http://localhost:8899
      org-id: test-org
    ack:
      kube-config-path: ""
  engine:
    base-url: http://localhost:8081
