name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: |
            forge-core/go.sum
            forge-bot/go.sum

      - name: Build forge-core
        working-directory: forge-core
        run: go build ./cmd/forge-core

      - name: Build forge-bot
        working-directory: forge-bot
        run: go build ./cmd/forge-bot

      - name: Vet forge-core
        working-directory: forge-core
        run: go vet ./internal/...

      - name: Vet forge-bot
        working-directory: forge-bot
        run: go vet ./...

      - name: Test forge-core
        working-directory: forge-core
        run: go test ./internal/... -count=1 -race

      - name: Test forge-bot
        working-directory: forge-bot
        run: go test ./... -count=1 -race

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-worker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-worker/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Unit Tests with Coverage
        run: |
          python -m pytest tests/ \
            --cov=src \
            --cov-report=term \
            --cov-fail-under=50 \
            --tb=short \
            -q

  typescript-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forge-portal

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: forge-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint app/ components/ lib/ --max-warnings 50

      - name: Build
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [go-test, python-test, typescript-check]

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=$(git describe --tags --always)" >> $GITHUB_ENV

      - name: Build forge-core
        run: docker build --build-arg VERSION=$VERSION -t forge-core:ci ./forge-core

      - name: Build ai-worker
        run: docker build -t forge-ai-worker:ci ./ai-worker

      - name: Build forge-portal
        run: docker build -t forge-portal:ci ./forge-portal

      - name: Build forge-bot
        run: docker build -t forge-bot:ci ./forge-bot

      - name: Verify images
        run: |
          docker images --format "{{.Repository}}:{{.Tag}} {{.Size}}" | grep ":ci"
