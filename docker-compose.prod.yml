# Forge Production Docker Compose
# Deploys the complete Forge stack for production or staging use.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml down
#
# Prerequisites:
#   - Set environment variables in .env.prod
#   - Build images first: docker compose -f docker-compose.prod.yml build

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: forge-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-forge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-forge_prod_2026}
      POSTGRES_DB: ${DB_NAME:-forge_main}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - forge-pg-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-forge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: forge-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-forge_redis_2026} --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.24
    container_name: forge-temporal
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${DB_USER:-forge}
      - POSTGRES_PWD=${DB_PASSWORD:-forge_prod_2026}
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: forge-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8233:8080"
    depends_on:
      - temporal
    restart: unless-stopped

  forge-core:
    build: ./forge-core
    container_name: forge-core
    environment:
      - DATABASE_URL=postgres://${DB_USER:-forge}:${DB_PASSWORD:-forge_prod_2026}@postgres:5432/${DB_NAME:-forge_main}?sslmode=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-forge_redis_2026}
      - TEMPORAL_ADDRESS=temporal:7233
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - PORT=8080
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      temporal:
        condition: service_started
    restart: unless-stopped

  ai-worker:
    build: ./ai-worker
    container_name: forge-ai-worker
    environment:
      - TEMPORAL_HOST=temporal:7233
      - FORGE_API_URL=http://forge-core:8080
      - FORGE_API_TOKEN=${FORGE_API_TOKEN:-}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-forge_redis_2026}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    depends_on:
      - temporal
      - forge-core
    restart: unless-stopped

  forge-portal:
    build:
      context: ./forge-portal
      args:
        - API_URL=http://forge-core:8080
    container_name: forge-portal
    environment:
      - API_URL=http://forge-core:8080
    ports:
      - "${PORTAL_PORT:-3000}:3000"
    depends_on:
      - forge-core
    restart: unless-stopped

volumes:
  forge-pg-data:
