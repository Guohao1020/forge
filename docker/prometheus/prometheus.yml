global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "forge-core"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: "forge-core"

  - job_name: "temporal"
    metrics_path: /metrics
    static_configs:
      - targets: ["temporal:9090"]
        labels:
          service: "temporal"
