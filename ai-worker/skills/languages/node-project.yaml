name: node-project
description: Node.js / TypeScript project with package.json
detect:
  files:
    - package.json
  extensions:
    - .ts
    - .tsx
    - .js
    - .jsx
    - .mts
    - .cts
build:
  # package.json is the single marker. The build script is
  # conventionally `npm run build`; for TypeScript-only projects it
  # may be `tsc --noEmit`. The detect pass in
  # project_language.detect_build_command picks whichever npm script
  # is defined.
  commands:
    - marker: package.json
      command: npm run build --if-present
  timeout_seconds: 300
test:
  commands:
    - marker: package.json
      command: npm test --if-present
  timeout_seconds: 300
lint:
  commands:
    - marker: package.json
      command: npm run lint --if-present
  timeout_seconds: 120
