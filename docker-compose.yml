version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: forge-mysql
    environment:
      MYSQL_ROOT_PASSWORD: forge_root_2026
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - forge-mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: forge-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass forge_redis_2026

  nacos:
    image: nacos/nacos-server:v2.3.1
    container_name: forge-nacos
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: forge_nacos
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: forge_root_2026
    ports:
      - "8848:8848"
      - "9848:9848"
    depends_on:
      - mysql

  kafka:
    image: apache/kafka:3.7.0
    container_name: forge-kafka
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9094:9094"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: forge-es
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - forge-es-data:/usr/share/elasticsearch/data

  apisix:
    image: apache/apisix:3.9.0-debian
    container_name: forge-apisix
    ports:
      - "9080:9080"
      - "9443:9443"
      - "9180:9180"
    volumes:
      - ./docker/apisix/config.yaml:/usr/local/apisix/conf/config.yaml
      - ./docker/apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml
    depends_on:
      - etcd

  etcd:
    image: quay.io/coreos/etcd:v3.5.13
    container_name: forge-etcd
    command: etcd --advertise-client-urls http://0.0.0.0:2379 --listen-client-urls http://0.0.0.0:2379
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
    ports:
      - "2379:2379"

  forge-engine:
    build: ./forge-engine
    container_name: forge-engine
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/forge_engine?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: forge_root_2026
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: forge_redis_2026
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - mysql
      - redis
      - nacos
      - kafka

  forge-identity:
    build: ./forge-identity
    container_name: forge-identity
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/forge_identity?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: forge_root_2026
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: forge_redis_2026
    depends_on:
      - mysql
      - redis
      - nacos

  forge-pipeline:
    build: ./forge-pipeline
    container_name: forge-pipeline
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/forge_pipeline?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: forge_root_2026
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: forge_redis_2026
    depends_on:
      - mysql
      - redis
      - nacos

  forge-specs:
    build: ./forge-specs
    container_name: forge-specs
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/forge_specs?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: forge_root_2026
    depends_on:
      - mysql
      - nacos

  forge-bot:
    build: ./forge-bot
    container_name: forge-bot
    ports:
      - "8085:8085"
    depends_on:
      - nacos

  forge-beacon:
    build: ./forge-beacon
    container_name: forge-beacon
    ports:
      - "3001:3001"

  forge-portal:
    build: ./forge-portal
    container_name: forge-portal
    ports:
      - "5173:80"
    depends_on:
      - apisix

volumes:
  forge-mysql-data:
  forge-es-data:
